{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
  <div class="card shadow-sm border-0 dashboard-card">
    <div class="card-body">
      <h2 class="mb-2">Overview Dashboard</h2>
      <p class="text-muted mb-4">Power BI overview report embedded in IBP.</p>

      <div id="reportContainer" class="report-container"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/powerbi-client/dist/powerbi.js"></script>
<script>
  const models = window['powerbi-client'].models;

  const config = {
    type: 'report',
    id: '{{ pbi_overview_report_id }}',
    embedUrl: '{{ pbi_overview_embed_url }}',
    accessToken: '{{ pbi_access_token }}',
    tokenType: models.TokenType.Aad,
    settings: {
      panes: {
        filters: { visible: false },
        pageNavigation: { visible: false }
      }
    }
  };
</script>
{% endblock %}
